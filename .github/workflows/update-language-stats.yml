name: update language stats

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update_language_stats.py"
      - ".github/workflows/update-language-stats.yml"

permissions:
  contents: write

concurrency:
  group: update-language-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: update language chart
        run: python3 scripts/update_language_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update language stats"
          file_pattern: assets/language-stats.svg
