<svg width="720" height="360" viewBox="0 0 720 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linguagens mais usadas</title>
  <desc id="desc">Grafico com percentuais de linguagens calculados pelos bytes de codigo dos repositorios publicos.</desc>
  <rect width="720" height="360" rx="12" fill="#1a1b27"/>
  <text x="32" y="42" fill="#70a5fd" font-family="Segoe UI, Ubuntu, sans-serif" font-size="22" font-weight="700">Linguagens mais usadas</text>
  <text x="32" y="68" fill="#a9b1d6" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Baseado nos bytes de codigo dos repositorios publicos</text>

  <g font-family="Segoe UI, Ubuntu, sans-serif" font-size="14">
    <text x="32" y="112" fill="#c0caf5">Python</text>
    <rect x="138" y="97" width="520" height="20" rx="10" fill="#24283b"/>
    <rect x="138" y="97" width="175.7" height="20" rx="10" fill="#3572A5"/>
    <text x="612" y="112" fill="#c0caf5" text-anchor="end">33.79%</text>

    <text x="32" y="146" fill="#c0caf5">Java</text>
    <rect x="138" y="131" width="520" height="20" rx="10" fill="#24283b"/>
    <rect x="138" y="131" width="153.0" height="20" rx="10" fill="#b07219"/>
    <text x="612" y="146" fill="#c0caf5" text-anchor="end">29.42%</text>

    <text x="32" y="180" fill="#c0caf5">Rust</text>
    <rect x="138" y="165" width="520" height="20" rx="10" fill="#24283b"/>
    <rect x="138" y="165" width="76.2" height="20" rx="10" fill="#dea584"/>
    <text x="612" y="180" fill="#c0caf5" text-anchor="end">14.65%</text>

    <text x="32" y="214" fill="#c0caf5">JavaScript</text>
    <rect x="138" y="199" width="520" height="20" rx="10" fill="#24283b"/>
    <rect x="138" y="199" width="55.7" height="20" rx="10" fill="#f1e05a"/>
    <text x="612" y="214" fill="#c0caf5" text-anchor="end">10.72%</text>

    <text x="32" y="248" fill="#c0caf5">CSS</text>
    <rect x="138" y="233" width="520" height="20" rx="10" fill="#24283b"/>
    <rect x="138" y="233" width="25.1" height="20" rx="10" fill="#563d7c"/>
    <text x="612" y="248" fill="#c0caf5" text-anchor="end">4.82%</text>

    <text x="32" y="282" fill="#c0caf5">Shell</text>
    <rect x="138" y="267" width="520" height="20" rx="10" fill="#24283b"/>
    <rect x="138" y="267" width="16.3" height="20" rx="10" fill="#89e051"/>
    <text x="612" y="282" fill="#c0caf5" text-anchor="end">3.13%</text>

    <text x="32" y="316" fill="#c0caf5">HTML + outras</text>
    <rect x="138" y="301" width="520" height="20" rx="10" fill="#24283b"/>
    <rect x="138" y="301" width="18.0" height="20" rx="10" fill="#e34c26"/>
    <text x="612" y="316" fill="#c0caf5" text-anchor="end">3.47%</text>
  </g>
</svg>
